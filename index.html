<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Platform</title>
<style>
:root{--primary:#0062ff;--bg:#f8fbff;--card:#fff;--border:#e3e8ef;--text:#0a192f}
[data-theme="dark"]{--bg:#0f1419;--card:#1a202c;--border:#2d3748;--text:#e6e6e6}
body{font-family:sans-serif;margin:0;background:var(--bg);color:var(--text)}
#auth-overlay{position:fixed;inset:0;background:var(--bg);z-index:2000;display:flex;justify-content:center;align-items:center;padding:1rem}
.auth-box{background:var(--card);padding:2rem;border-radius:12px;width:100%;max-width:350px}
.btn{background:var(--primary);color:#fff;padding:.8rem;border:none;border-radius:6px;width:100%;cursor:pointer}
#main{display:none;padding-bottom:80px}
.feed{padding:1rem;max-width:600px;margin:0 auto}
.post-card{background:var(--card);padding:1rem;border:1px solid var(--border);border-radius:8px;margin-bottom:1rem}
.nav-bottom{position:fixed;bottom:0;width:100%;background:var(--card);display:flex;border-top:1px solid var(--border);height:60px}
.nav-btn{flex:1;border:none;background:none;cursor:pointer;border-right:1px solid var(--border)}
.nav-btn:last-child{border-right:none}
.nav-btn:hover{background:var(--bg)}
</style>
</head>
<body>

<div id="auth-overlay">
  <div class="auth-box">
    <h2>Social Login</h2>
    <input type="email" id="email" style="width:100%;margin-bottom:10px" placeholder="Email">
    <input type="password" id="password" style="width:100%;margin-bottom:10px" placeholder="Password">
    <button class="btn" id="submit-btn">Login</button>
  </div>
</div>

<div id="main">
  <div class="feed" id="feed"></div>
  <div class="nav-bottom">
    <button class="nav-btn" onclick="showHome()">Home</button>
    <button class="nav-btn" onclick="showPost()">Post</button>
    <button class="nav-btn" onclick="showProfile()">Profile</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// Initialize with your Firebase Config
const app = initializeApp({...});
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, user => {
  if(user) {
    document.getElementById('auth-overlay').style.display = 'none';
    document.getElementById('main').style.display = 'block';
  } else {
    document.getElementById('auth-overlay').style.display = 'flex';
    document.getElementById('main').style.display = 'none';
  }
});
</script>
</body>
</html>
