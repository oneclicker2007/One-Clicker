<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Platform | Connect</title>
    <style>
        :root { --bg: #ffffff; --text: #0a192f; --border: #e3e8ef; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; justify-content: center; align-items: center; padding: 1rem; }
        .auth-box { width: 100%; max-width: 400px; padding: 2rem; border: 1px solid var(--border); border-radius: 12px; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #000; color: #fff; border: none; cursor: pointer; border-radius: 6px; font-weight: bold; }
        .err-msg { color: #d32f2f; font-size: 0.85rem; margin-bottom: 10px; display: none; font-weight: 500; text-align: center; }
        .post-card { border: 1px solid var(--border); padding: 1rem; border-radius: 8px; margin-bottom: 1rem; }
        .post-author { font-size: 0.8rem; font-weight: bold; color: #555; margin-bottom: 5px; }
        .profile-container { padding: 1rem; text-align: center; }
        .name-display { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 15px 0; font-size: 1.2rem; font-weight: bold; }
        #edit-section { display: none; margin-top: 10px; }
        .pencil-icon { cursor: pointer; width: 20px; height: 20px; fill: #555; }
        #main { display: none; max-width: 600px; margin: 0 auto; padding-bottom: 80px; }
        .view { display: none; padding: 1rem; }
        .view.active { display: block; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; max-width: 600px; height: 60px; background: #ffffff; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-around; }
        .nav-btn { background: none; border: none; cursor: pointer; padding: 10px; }
        .nav-btn svg { width: 28px; height: 28px; fill: #000000; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-box">
        <h2 id="auth-title">Login</h2>
        <div id="auth-err" class="err-msg"></div>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button class="btn" id="auth-btn">Continue</button>
        <p style="cursor:pointer;text-align:center;text-decoration:underline;margin-top:15px;font-size:0.9rem" id="toggle-auth">Create an account instead</p>
    </div>
</div>

<div id="main">
    <div id="home-view" class="view active"><h1>Feed</h1><div id="feed-container"></div></div>
    <div id="post-view" class="view">
        <h1>Create Post</h1>
        <textarea id="post-text" placeholder="What's happening?" maxlength="1000"></textarea>
        <button class="btn" onclick="createPost()">Post</button>
    </div>
    <div id="profile-view" class="view">
        <div class="profile-container">
            <h1>Profile</h1>
            <p><strong>Account ID:</strong> <span id="display-uid"></span></p>
            <div class="name-display">
                <span id="name-text"></span>
                <svg class="pencil-icon" onclick="toggleEdit()" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
            </div>
            <div id="edit-section">
                <input type="text" id="username-input" maxlength="20">
                <button class="btn" onclick="updateProfile()">Save</button>
            </div>
            <button class="btn" onclick="logout()" style="background:#d32f2f; margin-top: 20px;">Logout</button>
        </div>
    </div>

    <nav class="nav-bottom">
        <button class="nav-btn" onclick="switchView('home-view')"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></button>
        <button class="nav-btn" onclick="switchView('post-view')"><svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></button>
        <button class="nav-btn" onclick="loadProfile(); switchView('profile-view')"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></button>
    </nav>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDdOMnwf1r0e5ETserurMUeRkufc17vE_g",
        authDomain: "one-clicker-c35eb.firebaseapp.com",
        projectId: "one-clicker-c35eb",
        storageBucket: "one-clicker-c35eb.firebasestorage.app",
        messagingSenderId: "104489532169",
        appId: "1:104489532169:web:6ef47037bc2bbc9f8af1d8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let currentUser = null, currentDisplayName = "", placeholderInterval = null;

    window.switchView = (id) => {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };

    const showError = (msg) => {
        const errEl = document.getElementById('auth-err');
        errEl.innerText = msg;
        errEl.style.display = 'block';
    };

    window.toggleEdit = () => {
        const editSec = document.getElementById('edit-section');
        const isHidden = editSec.style.display !== 'block';
        editSec.style.display = isHidden ? 'block' : 'none';
        if (isHidden) {
            const examples = ["Maria", "Rahul", "Shiva"];
            let i = 0;
            placeholderInterval = setInterval(() => { document.getElementById('username-input').placeholder = `e.g. ${examples[i]}`; i = (i + 1) % examples.length; }, 1500);
        } else { clearInterval(placeholderInterval); }
    };

    document.getElementById('toggle-auth').onclick = () => {
        let isLogin = document.getElementById('auth-title').innerText === "Login";
        document.getElementById('auth-title').innerText = isLogin ? "Sign Up" : "Login";
        document.getElementById('auth-btn').innerText = isLogin ? "Register" : "Continue";
        document.getElementById('toggle-auth').innerText = isLogin ? "Already have an account? Login" : "Create an account instead";
        document.getElementById('auth-err').style.display = 'none';
    };

    window.loadProfile = async () => {
        const docRef = doc(db, "users", currentUser.uid);
        const docSnap = await getDoc(docRef);
        document.getElementById('display-uid').innerText = currentUser.uid;
        currentDisplayName = (docSnap.exists() && docSnap.data().username) ? docSnap.data().username : currentUser.email.split('@')[0];
        document.getElementById('name-text').innerText = currentDisplayName;
        document.getElementById('username-input').value = currentDisplayName;
    };

    window.updateProfile = async () => {
        const username = document.getElementById('username-input').value.trim();
        if(!username) return;
        await setDoc(doc(db, "users", currentUser.uid), { username }, { merge: true });
        currentDisplayName = username;
        document.getElementById('name-text').innerText = currentDisplayName;
        clearInterval(placeholderInterval);
        toggleEdit();
    };

    window.createPost = async () => {
        const text = document.getElementById('post-text').value.trim();
        if (!text) return;
        await addDoc(collection(db, "posts"), { content: text, authorUID: currentUser.uid, authorName: currentDisplayName, createdAt: serverTimestamp() });
        document.getElementById('post-text').value = '';
        switchView('home-view');
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            await loadProfile();
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('main').style.display = 'block';
            const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
            onSnapshot(q, snap => {
                const container = document.getElementById('feed-container');
                container.innerHTML = '';
                snap.forEach(doc => {
                    const data = doc.data();
                    container.innerHTML += `<div class="post-card"><div class="post-author">${data.authorName || 'Anonymous'}</div><p>${data.content.replace(/</g, "&lt;")}</p>${data.authorUID === user.uid ? `<button onclick="deletePost('${doc.id}')" style="color:red;border:none;background:none;cursor:pointer">Delete</button>` : ''}</div>`;
                });
            });
        }
    });

    window.deletePost = async (id) => { if(confirm("Delete this post?")) await deleteDoc(doc(db, "posts", id)); };
    window.logout = () => { signOut(auth); location.reload(); };
    document.getElementById('auth-btn').onclick = async () => {
        const email = document.getElementById('email').value.trim(), pass = document.getElementById('password').value.trim();
        if (!email || !pass) { showError("Please fill all fields."); return; }
        try { 
            document.getElementById('auth-title').innerText === "Login" ? await signInWithEmailAndPassword(auth, email, pass) : await createUserWithEmailAndPassword(auth, email, pass); 
        } catch(e) { 
            const msg = e.code === 'auth/invalid-credential' ? "Incorrect email or password." : e.code === 'auth/email-already-in-use' ? "Email already exists." : "An error occurred.";
            showError(msg); 
        }
    };
</script>
</body>
</html>
