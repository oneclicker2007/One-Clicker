<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Platform | Connect</title>
    <style>
        :root { --bg: #ffffff; --text: #0a192f; --border: #e3e8ef; }
        [data-theme="dark"] { --bg: #0a192f; --text: #ffffff; --border: #1f2d40; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: background 0.3s, color 0.3s; overflow-x: hidden; }
        
        #auth-overlay, #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; display: none; justify-content: center; align-items: center; padding: 1rem; }
        #auth-overlay { display: flex; background: var(--bg); }
        .auth-box, .modal-box { width: 90%; max-width: 400px; padding: 2rem; border: 1px solid var(--border); border-radius: 12px; background: var(--bg); text-align: center; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; background: var(--bg); color: var(--text); }
        .btn { width: 100%; padding: 12px; background: #000; color: #fff; border: none; cursor: pointer; border-radius: 6px; font-weight: bold; margin-top: 10px; }
        .btn-cancel { background: #e0e0e0; color: #000; }
        
        /* Updated Error Message Design */
        .err-msg { display: none; background: #fff5f5; border-left: 5px solid #d32f2f; color: #d32f2f; padding: 12px; margin-bottom: 15px; border-radius: 4px; font-size: 0.9rem; font-weight: 500; text-align: left; }
        
        #main { display: none; width: 100%; max-width: 600px; margin: 0 auto; min-height: 100vh; padding-bottom: 80px; box-sizing: border-box; }
        .view { display: none; padding: 1rem; width: 100%; box-sizing: border-box; }
        .view.active { display: block; }
        
        .post-card { border: 1px solid var(--border); padding: 1rem; border-radius: 8px; margin-bottom: 1rem; width: 100%; box-sizing: border-box; }
        .post-author { font-size: 0.8rem; font-weight: bold; color: #777; margin-bottom: 5px; }
        .post-title { font-weight: bold; font-size: 1.1rem; margin-bottom: 5px; }
        
        .post-card p, .post-title { word-break: break-all; overflow-wrap: anywhere; white-space: pre-wrap; }
        .post-card p { margin: 5px 0; }
        
        .profile-container, .settings-container, .chat-container { padding: 1rem; text-align: center; }
        .name-display { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 15px 0; font-size: 1.2rem; font-weight: bold; }
        #edit-section { display: none; margin-top: 10px; }
        .pencil-icon { cursor: pointer; width: 20px; height: 20px; fill: var(--text); }
        
        .nav-bottom { position: fixed; bottom: 0; width: 100%; max-width: 600px; height: 70px; background: var(--bg); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-around; z-index: 1000; }
        .nav-btn { background: none; border: none; cursor: pointer; padding: 5px; display: flex; align-items: center; justify-content: center; }
        .nav-btn svg { width: 28px; height: 28px; fill: var(--text); }
        .nav-btn.post-btn svg { width: 40px; height: 40px; background: #000; fill: #fff; padding: 10px; border-radius: 50%; }
        
        .toggle-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 20px 0; }
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; border-radius: 24px; transition: 0.4s; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; border-radius: 50%; transition: 0.4s; }
        input:checked + .slider { background-color: #000; }
        input:checked + .slider:before { transform: translateX(26px); }
    </style>
</head>
<body>

<div id="modal-overlay">
    <div class="modal-box" id="modal-content">
        <h3 id="modal-title">Action</h3>
        <p id="modal-body">Are you sure?</p>
        <button class="btn" id="modal-confirm-btn">Confirm</button>
        <button class="btn btn-cancel" onclick="document.getElementById('modal-overlay').style.display='none'">Cancel</button>
    </div>
</div>

<div id="auth-overlay">
    <div class="auth-box">
        <h2 id="auth-title">Login</h2>
        <div id="auth-err" class="err-msg"></div>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button class="btn" id="auth-btn">Continue</button>
        <p style="cursor:pointer;text-align:center;text-decoration:underline;margin-top:15px;font-size:0.9rem" id="toggle-auth">Create an account instead</p>
    </div>
</div>

<div id="main">
    <div id="home-view" class="view active"><h1>Feed</h1><div id="feed-container"></div></div>
    <div id="chat-view" class="view"><h1>Chat</h1><p>Coming soon...</p></div>
    <div id="post-view" class="view">
        <h1>Create Post</h1>
        <input type="text" id="post-title" placeholder="Title (Max 50)" maxlength="50">
        <textarea id="post-text" placeholder="What's happening? (Max 1000)" maxlength="1000"></textarea>
        <button class="btn" onclick="createPost()">Post</button>
    </div>
    <div id="profile-view" class="view">
        <div class="profile-container">
            <h1>Profile</h1>
            <p><strong>Account ID:</strong> <span id="display-uid"></span></p>
            <div class="name-display">
                <span id="name-text"></span>
                <svg class="pencil-icon" onclick="toggleEdit()" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
            </div>
            <div id="edit-section">
                <input type="text" id="username-input" maxlength="20">
                <button class="btn" onclick="updateProfile()">Save</button>
            </div>
            <button class="btn" onclick="showModal('Logout', 'Are you sure you want to logout?', executeLogout)" style="background:#d32f2f; margin-top: 20px;">Logout</button>
        </div>
    </div>
    <div id="settings-view" class="view">
        <div class="settings-container">
            <h1>Settings</h1>
            <div class="toggle-container">
                <span>Dark Mode</span>
                <label class="switch">
                    <input type="checkbox" id="theme-toggle" onchange="toggleTheme()">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </div>

    <nav class="nav-bottom">
        <button class="nav-btn" onclick="switchView('home-view')"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></button>
        <button class="nav-btn" onclick="switchView('chat-view')"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg></button>
        <button class="nav-btn post-btn" onclick="switchView('post-view')"><svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></button>
        <button class="nav-btn" onclick="loadProfile(); switchView('profile-view')"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></button>
        <button class="nav-btn" onclick="switchView('settings-view')"><svg viewBox="0 0 24 24"><path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s-.03.66-.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg></button>
    </nav>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDdOMnwf1r0e5ETserurMUeRkufc17vE_g",
        authDomain: "one-clicker-c35eb.firebaseapp.com",
        projectId: "one-clicker-c35eb",
        storageBucket: "one-clicker-c35eb.firebasestorage.app",
        messagingSenderId: "104489532169",
        appId: "1:104489532169:web:6ef47037bc2bbc9f8af1d8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let currentUser = null, currentDisplayName = "", placeholderInterval = null;

    window.showModal = (title, body, confirmCallback) => {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-body').innerText = body;
        document.getElementById('modal-confirm-btn').onclick = () => { confirmCallback(); document.getElementById('modal-overlay').style.display='none'; };
        document.getElementById('modal-overlay').style.display = 'flex';
    };

    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    document.getElementById('theme-toggle').checked = (savedTheme === 'dark');

    window.toggleTheme = () => {
        const isDark = document.getElementById('theme-toggle').checked;
        const theme = isDark ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
    };

    window.switchView = (id) => {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };

    const showError = (msg) => {
        const errEl = document.getElementById('auth-err');
        errEl.innerText = msg;
        errEl.style.display = 'block';
    };

    window.toggleEdit = () => {
        const editSec = document.getElementById('edit-section');
        const isHidden = editSec.style.display !== 'block';
        editSec.style.display = isHidden ? 'block' : 'none';
        if (isHidden) {
            const examples = ["Maria", "Rahul", "Shiva"];
            let i = 0;
            placeholderInterval = setInterval(() => { document.getElementById('username-input').placeholder = `e.g. ${examples[i]}`; i = (i + 1) % examples.length; }, 1500);
        } else { clearInterval(placeholderInterval); }
    };

    document.getElementById('toggle-auth').onclick = () => {
        let isLogin = document.getElementById('auth-title').innerText === "Login";
        document.getElementById('auth-title').innerText = isLogin ? "Sign Up" : "Login";
        document.getElementById('auth-btn').innerText = isLogin ? "Register" : "Continue";
        document.getElementById('toggle-auth').innerText = isLogin ? "Already have an account? Login" : "Create an account instead";
        document.getElementById('auth-err').style.display = 'none';
    };

    window.loadProfile = async () => {
        const docRef = doc(db, "users", currentUser.uid);
        const docSnap = await getDoc(docRef);
        document.getElementById('display-uid').innerText = currentUser.uid;
        currentDisplayName = (docSnap.exists() && docSnap.data().username) ? docSnap.data().username : currentUser.email.split('@')[0];
        document.getElementById('name-text').innerText = currentDisplayName;
        document.getElementById('username-input').value = currentDisplayName;
    };

    window.updateProfile = async () => {
        const username = document.getElementById('username-input').value.trim();
        if(!username) return;
        await setDoc(doc(db, "users", currentUser.uid), { username }, { merge: true });
        currentDisplayName = username;
        document.getElementById('name-text').innerText = currentDisplayName;
        clearInterval(placeholderInterval);
        toggleEdit();
    };

    window.createPost = async () => {
        const title = document.getElementById('post-title').value.trim();
        const text = document.getElementById('post-text').value.trim();
        if (!text) return;
        await addDoc(collection(db, "posts"), { 
            title: title, 
            content: text, 
            authorUID: currentUser.uid, 
            authorName: currentDisplayName, 
            createdAt: serverTimestamp() 
        });
        document.getElementById('post-title').value = '';
        document.getElementById('post-text').value = '';
        switchView('home-view');
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            await loadProfile();
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('main').style.display = 'block';
            const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
            onSnapshot(q, snap => {
                const container = document.getElementById('feed-container');
                container.innerHTML = '';
                snap.forEach(doc => {
                    const data = doc.data();
                    container.innerHTML += `
                        <div class="post-card">
                            <div class="post-author">${data.authorName || 'Anonymous'}</div>
                            ${data.title ? `<div class="post-title">${data.title.replace(/</g, "&lt;")}</div>` : ''}
                            <p>${data.content.replace(/</g, "&lt;")}</p>
                            ${data.authorUID === user.uid ? `<button onclick="showModal('Delete Post', 'Are you sure?', () => deletePost('${doc.id}'))" style="color:red;border:none;background:none;cursor:pointer">Delete</button>` : ''}
                        </div>`;
                });
            });
        }
    });

    window.deletePost = async (id) => { await deleteDoc(doc(db, "posts", id)); };
    
    window.executeLogout = () => {
        signOut(auth);
        location.reload();
    };
    
    document.getElementById('auth-btn').onclick = async () => {
        const email = document.getElementById('email').value.trim(), pass = document.getElementById('password').value.trim();
        if (!email || !pass) { showError("Please fill all fields."); return; }
        try { 
            document.getElementById('auth-title').innerText === "Login" ? await signInWithEmailAndPassword(auth, email, pass) : await createUserWithEmailAndPassword(auth, email, pass); 
        } catch(e) { 
            const msg = e.code === 'auth/invalid-credential' ? "Invalid credentials." : e.code === 'auth/email-already-in-use' ? "Email already exists." : "An error occurred.";
            showError(msg); 
        }
    };
</script>
</body>
</html>
