<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Web App</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Firebase Project: one-clicker</h1>
        <p id="status">Initializing Firebase...</p>
        <p>Open the <b>Browser Console</b> (F12) to see the details.</p>
    </div>

    <script type="module">
        // Import the functions you need from the SDKs you need
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDdOMnwf1r0e5ETserurMUeRkufc17vE_g",
            authDomain: "one-clicker-c35eb.firebaseapp.com",
            projectId: "one-clicker-c35eb",
            storageBucket: "one-clicker-c35eb.firebasestorage.app",
            messagingSenderId: "104489532169",
            appId: "1:104489532169:web:6ef47037bc2bbc9f8af1d8"
        };

        // Initialize Firebase
        try {
            const app = initializeApp(firebaseConfig);
            console.log("Firebase initialized successfully:", app);
            document.getElementById('status').innerText = "Firebase is connected!";
            document.getElementById('status').style.color = "green";
        } catch (error) {
            console.error("Firebase initialization error:", error);
            document.getElementById('status').innerText = "Initialization failed.";
            document.getElementById('status').style.color = "red";
        }
    </script>
</body>
</html>
