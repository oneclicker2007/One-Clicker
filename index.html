<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Platform | Connect</title>
<style>
    :root { --bg: #ffffff; --text: #0a192f; --primary: #000000; --border: #e3e8ef; --card: #ffffff; }
    body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; }
    #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; justify-content: center; align-items: center; padding: 1rem; }
    .auth-box { width: 100%; max-width: 400px; padding: 2rem; border: 1px solid var(--border); border-radius: 12px; }
    input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; }
    .btn { width: 100%; padding: 12px; background: var(--primary); color: #fff; border: none; cursor: pointer; border-radius: 6px; font-weight: bold; }
    .err { color: #d32f2f; font-size: 0.85rem; margin-bottom: 10px; display: none; }
    #main { display: none; max-width: 600px; margin: 0 auto; padding-bottom: 80px; }
    .view { display: none; padding: 1rem; }
    .view.active { display: block; }
    .post-card { border: 1px solid var(--border); padding: 1rem; border-radius: 8px; margin-bottom: 1rem; }
    .nav-bottom { position: fixed; bottom: 0; width: 100%; max-width: 600px; height: 60px; background: #fff; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-around; }
    .nav-btn { background: none; border: none; cursor: pointer; }
</style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-box">
        <h2 id="auth-title">Login</h2>
        <div id="auth-err" class="err"></div>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button class="btn" id="auth-btn">Continue</button>
        <p style="cursor:pointer;text-align:center;text-decoration:underline;margin-top:15px;font-size:0.9rem" id="toggle-auth">Create an account instead</p>
    </div>
</div>

<div id="main">
    <div id="home-view" class="view active"><h1>Feed</h1><div id="feed-container"></div></div>
    <div id="post-view" class="view">
        <h1>Create Post</h1>
        <textarea id="post-text" placeholder="What's happening? (max 1000 chars)" maxlength="1000"></textarea>
        <button class="btn" onclick="createPost()">Post</button>
    </div>
    <div id="profile-view" class="view"><h1>Profile</h1><button class="btn" onclick="logout()" style="background:#d32f2f">Logout</button></div>

    <nav class="nav-bottom">
        <button class="nav-btn" onclick="switchView('home-view')">Home</button>
        <button class="nav-btn" onclick="switchView('post-view')">Post</button>
        <button class="nav-btn" onclick="switchView('profile-view')">Profile</button>
    </nav>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDdOMnwf1r0e5ETserurMUeRkufc17vE_g",
        authDomain: "one-clicker-c35eb.firebaseapp.com",
        projectId: "one-clicker-c35eb",
        storageBucket: "one-clicker-c35eb.firebasestorage.app",
        messagingSenderId: "104489532169",
        appId: "1:104489532169:web:6ef47037bc2bbc9f8af1d8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let currentUser = null;

    // View Switching
    window.switchView = (id) => {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };

    // Create Post
    window.createPost = async () => {
        const text = document.getElementById('post-text').value.trim();
        if (!text) return;
        try {
            await addDoc(collection(db, "posts"), {
                content: text,
                authorUID: currentUser.uid,
                createdAt: serverTimestamp()
            });
            document.getElementById('post-text').value = '';
            switchView('home-view');
        } catch (e) { alert("Error posting: " + e.message); }
    };

    // Delete Post
    window.deletePost = async (id) => {
        if(confirm("Delete this post?")) await deleteDoc(doc(db, "posts", id));
    };

    // Feed Listener
    onAuthStateChanged(auth, user => {
        currentUser = user;
        document.getElementById('auth-overlay').style.display = user ? 'none' : 'flex';
        document.getElementById('main').style.display = user ? 'block' : 'none';
        
        if (user) {
            const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
            onSnapshot(q, snap => {
                const container = document.getElementById('feed-container');
                container.innerHTML = '';
                snap.forEach(doc => {
                    const data = doc.data();
                    const isOwner = data.authorUID === user.uid;
                    container.innerHTML += `
                        <div class="post-card">
                            <p>${data.content.replace(/</g, "&lt;")}</p>
                            ${isOwner ? `<button onclick="deletePost('${doc.id}')" style="color:red">Delete</button>` : ''}
                        </div>`;
                });
            });
        }
    });

    // Auth Logic (Same as before)
    document.getElementById('toggle-auth').onclick = () => { /* ... toggle logic ... */ };
    document.getElementById('auth-btn').onclick = async () => { /* ... auth logic ... */ };
    window.logout = () => signOut(auth);
</script>
</body>
</html>
