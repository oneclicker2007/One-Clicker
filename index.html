<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Clicker - Esports Tournaments</title>
    <style>
        :root {
            --primary-blue: #0062ff;
            --text-dark: #0a192f;
            --text-light: #546e7a;
            --bg-light: #f8fbff;
            --bg-body: white;
            --card-bg: white;
            --border-color: #eee;
            --error-red: #d32f2f;
        }

        /* Dark Mode */
        body.dark-mode {
            --primary-blue: #3b82f6;
            --text-dark: #f8fafc;
            --text-light: #94a3b8;
            --bg-light: #0f172a;
            --bg-body: #020617;
            --card-bg: #1e293b;
            --border-color: #334155;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            color: var(--text-dark);
            background-color: var(--bg-body);
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
        }

        /* Auth Styles */
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-light); z-index: 2000; display: flex; justify-content: center; align-items: center; }
        .auth-container { background: var(--card-bg); padding: 2.5rem; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 90%; max-width: 400px; text-align: center; }
        .auth-form input { width: 100%; padding: 0.8rem; margin-bottom: 1rem; border: 1px solid var(--border-color); border-radius: 8px; box-sizing: border-box; }
        .auth-btn { width: 100%; background: var(--primary-blue); color: white; padding: 0.8rem; border: none; border-radius: 8px; cursor: pointer; }

        /* Navigation */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 1rem 5%; background: var(--bg-body); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border-color); }
        .logo { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 1.2rem; }
        .logo img { height: 40px; width: auto; }
        .nav-links { display: none; gap: 1.5rem; }
        .nav-links a { text-decoration: none; color: var(--text-dark); }
        
        /* Hero & Content */
        .hero { display: flex; flex-direction: column; padding: 3rem 5%; background: linear-gradient(135deg, var(--bg-body) 0%, var(--bg-light) 100%); align-items: center; text-align: center; }
        .hero-content h1 { font-size: 2.5rem; margin-bottom: 1rem; }
        .hero-content span { color: var(--primary-blue); }
        .btn-primary { background: var(--primary-blue); color: white; padding: 0.7rem 1.4rem; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; }
        .btn-outline { background: var(--bg-body); border: 1px solid var(--border-color); color: var(--text-dark); padding: 0.7rem 1.4rem; border-radius: 8px; cursor: pointer; font-weight: 600; }
        
        /* Tournament */
        .tournaments { padding: 4rem 5%; }
        .tournament-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 2rem; }
        .tournament-card { background: var(--card-bg); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border-color); }

        /* Toggle */
        #theme-toggle { background: var(--primary-blue); color: white; border: none; padding: 5px 15px; border-radius: 20px; cursor: pointer; margin-right: 10px; }

        @media (min-width: 992px) {
            .nav-links { display: flex; }
            .hero { flex-direction: row; text-align: left; padding: 6rem 8%; }
            .hero-content { flex: 1; }
        }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-container">
            <div class="logo" style="justify-content: center; margin-bottom: 1.5rem;">
                <img src="logo.png" alt="Logo">
                <span>1ne Clicker</span>
            </div>
            <h2 id="auth-title">Welcome Back</h2>
            <div class="auth-form">
                <div id="auth-error-msg" style="display:none; color:red;"></div>
                <input type="email" id="email" placeholder="Email">
                <input type="password" id="password" placeholder="Password">
                <button class="auth-btn" id="submit-btn">Login</button>
            </div>
        </div>
    </div>

    <div id="main-content" style="display: none;">
        <nav>
            <div class="logo"><img src="logo.png" alt="Logo"><span>1ne Clicker</span></div>
            <div class="nav-links">
                <a href="#">Home</a><a href="#">About</a><a href="#">Tournaments</a>
            </div>
            <div>
                <button id="theme-toggle" onclick="toggleTheme()">Dark Mode</button>
                <button class="btn-primary" onclick="handleLogout()">Logout</button>
            </div>
        </nav>

        <header class="hero">
            <div class="hero-content">
                <h1>Dominate the Arena.<br><span>Free Fire Max.</span></h1>
                <p>Join our professional esports tournaments.</p>
                <div class="cta-group" style="display: flex; gap: 10px;">
                    <button class="btn-primary">Join Tournament</button>
                </div>
            </div>
        </header>

        <section class="tournaments">
            <h2>Live Tournaments</h2>
            <div class="tournament-grid">
                <div class="tournament-card">
                    <h3>FF Max Squad Battle</h3>
                    <button class="btn-primary">Join Now</button>
                </div>
            </div>
        </section>
    </div>

    <script type="module">
        // Theme Toggle Script
        window.toggleTheme = () => {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        };
        if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');

        // ... (Keep your existing Firebase auth logic here) ...
    </script>
</body>
</html>
