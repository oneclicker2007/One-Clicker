<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Platform | Connect</title>
    <style>
        :root { --bg: #ffffff; --text: #1a1a1a; --primary: #000000; --accent: #f0f0f0; }
        [data-theme="dark"] { --bg: #121212; --text: #ffffff; --primary: #ffffff; --accent: #1e1e1e; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: background 0.3s; }
        
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .auth-box { width: 100%; max-width: 350px; }
        .auth-box h2 { margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; background: var(--bg); color: var(--text); }
        .btn { width: 100%; padding: 12px; background: var(--primary); color: var(--bg); border: none; cursor: pointer; font-weight: bold; }
        .toggle-text { margin-top: 15px; font-size: 0.9rem; cursor: pointer; text-decoration: underline; }

        #main { display: none; padding: 20px; padding-bottom: 80px; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; height: 60px; background: var(--bg); border-top: 1px solid #ccc; display: flex; }
        .nav-btn { flex: 1; border: none; background: var(--bg); color: var(--text); cursor: pointer; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; border-right: 1px solid #eee; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-box">
        <h2 id="auth-title">Login</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button class="btn" id="auth-btn">Continue</button>
        <p class="toggle-text" id="toggle-auth">Create an account instead</p>
    </div>
</div>

<div id="main">
    <div id="content-area"><h1>Feed</h1><p>Welcome to the platform.</p></div>
    <div class="nav-bottom">
        <button class="nav-btn">Home</button>
        <button class="nav-btn">Post</button>
        <button class="nav-btn">Profile</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
        // REPLACE WITH YOUR ACTUAL FIREBASE CONFIG FROM FIREBASE CONSOLE
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    let isLogin = true;
    const authBtn = document.getElementById('auth-btn');
    const toggleText = document.getElementById('toggle-auth');
    const authTitle = document.getElementById('auth-title');

    toggleText.onclick = () => {
        isLogin = !isLogin;
        authTitle.innerText = isLogin ? "Login" : "Sign Up";
        authBtn.innerText = isLogin ? "Continue" : "Register";
        toggleText.innerText = isLogin ? "Create an account instead" : "Already have an account? Login";
    };

    authBtn.onclick = async () => {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        if (!email || !password) return alert("Fill all fields");
        try {
            if (isLogin) await signInWithEmailAndPassword(auth, email, password);
            else await createUserWithEmailAndPassword(auth, email, password);
        } catch (e) { alert(e.message); }
    };

    onAuthStateChanged(auth, (user) => {
        document.getElementById('auth-overlay').style.display = user ? 'none' : 'flex';
        document.getElementById('main').style.display = user ? 'block' : 'none';
    });
</script>
</body>
</html>
